<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .botones {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-aceptar {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-aceptar:hover {
            transform: scale(1.02);
        }
        .btn-cancelar {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-cancelar:hover {
            transform: scale(1.02);
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Iniciar Sesión</h2>
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="form-group">
                <label>Clave</label>
                <input type="password" name="clave" placeholder="Ingresa tu clave" required>
            </div>
            <div class="botones">
                <input type="submit" class="btn-aceptar" value="✅ Aceptar">
                <input type="button" class="btn-cancelar" value="❌ Cancelar" onclick="cancelar()">
            </div>
        </form>
        <div class="info">
            Mini Servidor Web - Prueba POST/GET
        </div>
    </div>
    <script>
        function cancelar() {
            // Redirige a Google con la búsqueda de fundamentos de TCP/IP
            window.location.href = 'https://www.google.com/search?q=fundamentos+de+TCP%2FIP';
        }
    </script>
</body>
</html>
